<!DOCTYPE html>
<html lang="en">
<head>

<style>
  /* RESET & BASE STYLES */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body, html { width: 100%; height: 100vh; background-color: #ffffff; color: #111111; font-family: "Futura", "Trebuchet MS", "Century Gothic", sans-serif; overflow: hidden; }

  /* TYPOGRAPHY */
  h1, h2, h3, .menu-link { font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; line-height: 1; position: relative; z-index: 10; }
  p { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-weight: 400; font-size: 1.1rem; line-height: 1.6; color: #333333; }

  /* HEADER & MENU */
  header { position: fixed; top: 0; left: 0; width: 100%; padding: 40px 5vw; display: flex; justify-content: space-between; align-items: flex-start; z-index: 100; background: linear-gradient(to bottom, rgba(255,255,255,1) 60%, rgba(255,255,255,0)); pointer-events: none; }
  .title-group, .hamburger { pointer-events: auto; }
  .title-group h1 { font-size: clamp(1.5rem, 3vw, 2.5rem); }
  
  .back-link { text-decoration: none; color: #111111; display: inline-block; transition: transform 0.3s ease; }
  .back-link:hover { transform: translateX(-10px); }

  .hamburger { cursor: pointer; display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
  .hamburger span { display: block; width: 45px; height: 5px; background-color: #111111; transition: all 0.3s ease; }

  .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #ffffff; z-index: 101; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding-left: 10vw; opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s; }
  .menu-overlay.active { opacity: 1; visibility: visible; }
  .menu-link { font-size: clamp(3rem, 8vw, 6rem); color: #111111; text-decoration: none; margin: 15px 0; transition: transform 0.4s ease; }

  @keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  .liquid-hover-effect:hover { transform: translateX(30px); background: linear-gradient(90deg, #00d4ff, #ff00ff, #ff5e00, #00d4ff); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientFlow 3s ease infinite; }

  /* CONTACT SECTION */
  .contact-section { padding: 0 5vw; height: 100vh; display: grid; grid-template-columns: 1.2fr 1fr; gap: 80px; align-items: center; }
  
  /* LEFT COLUMN: CALL TO ACTION */
  .contact-statement h2 { font-size: clamp(3rem, 7vw, 6.5rem); line-height: 0.9; text-transform: uppercase; }
  
  /* RIGHT COLUMN: CHANNELS */
  .contact-channels { display: flex; flex-direction: column; gap: 40px; }
  
  .channel-item { border-bottom: 2px solid #111111; padding-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
  .channel-label { font-family: "JetBrains Mono", monospace; font-size: 0.9rem; color: #888888; text-transform: uppercase; letter-spacing: 0.1em; }
  .channel-value { font-size: clamp(1.5rem, 2.5vw, 2.2rem); font-weight: 900; color: #111111; text-decoration: none; transition: transform 0.3s ease; display: inline-block; word-break: break-all; }
  
  /* L'effetto liquido si attiva anche passando sopra ai dati di contatto */
  .channel-value:hover { background: linear-gradient(90deg, #00d4ff, #ff00ff, #ff5e00, #00d4ff); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientFlow 3s ease infinite; }

  /* RESPONSIVE */
  @media (max-width: 1024px) { 
    .contact-section { grid-template-columns: 1fr; gap: 60px; padding-top: 150px; align-content: start; height: auto; min-height: 100vh; }
  }
</style>
</head>
<body>

  <header>
    <div class="title-group">
      <a href="index.html" class="back-link">
        <h1>&larr; SIMONE CAPUTO</h1>
      </a>
    </div>
    
    <div class="hamburger" id="hamburgerBtn">
      <span></span><span></span><span></span>
    </div>
  </header>

  <nav class="menu-overlay" id="menuOverlay">
    <a href="index.html" class="menu-link liquid-hover-effect">HOME</a>
    <a href="index.html#projects" class="menu-link liquid-hover-effect">PORTFOLIO</a>
    <a href="about.html" class="menu-link liquid-hover-effect">PROFILE</a>
    <a href="contact.html" class="menu-link liquid-hover-effect">CONTACT</a>
  </nav>

  <section class="contact-section">
    
    <div class="contact-statement">
      <h2>LET'S<br>BUILD<br>SOMETHING.</h2>
    </div>

    <div class="contact-channels">
      
      <div class="channel-item">
        <span class="channel-label">Email</span>
        <a href="mailto:simone.caputo.arch@hotmail.com" class="channel-value">simone.caputo.arch@hotmail.com</a>
      </div>

      <div class="channel-item">
        <span class="channel-label">Phone</span>
        <a href="tel:+393899105834" class="channel-value">(+39) 389 910 5834</a>
      </div>

      <div class="channel-item">
        <span class="channel-label">Based in</span>
        <span class="channel-value" style="pointer-events: none;">Benevento, Italy &mdash; Open to relocation</span>
      </div>

    </div>
  </section>

  <script>
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const menuOverlay = document.getElementById('menuOverlay');
    const spans = hamburgerBtn.querySelectorAll('span');

    hamburgerBtn.addEventListener('click', () => {
      menuOverlay.classList.toggle('active');
      if (menuOverlay.classList.contains('active')) {
        spans[0].style.transform = 'translateY(13px) rotate(45deg)';
        spans[1].style.opacity = '0';
        spans[2].style.transform = 'translateY(-13px) rotate(-45deg)';
      } else {
        spans[0].style.transform = 'none';
        spans[1].style.opacity = '1';
        spans[2].style.transform = 'none';
      }
    });
  </script>
</body>
</html>
